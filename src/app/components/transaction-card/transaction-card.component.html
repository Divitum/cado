<mat-card class="card">
  <div class="left">
    <p id="head">{{ transaction.description }}</p>
    <div class="sub">
      <p>{{ transaction.category }}</p>
      <p>{{ transaction.date.getDate() }} {{ months[transaction.date.getMonth()] }} {{ transaction.date.getFullYear() }}</p>
    </div>
  </div>
  <div class="right">
    <p>- R{{ transaction.amount.toFixed(2) }}</p>
  </div>
</mat-card>
